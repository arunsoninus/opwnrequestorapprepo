# yaml-language-server: $schema=https://sap.github.io/ui5-tooling/schema/ui5.yaml.json

specVersion: "4.0"
metadata:
  name: nus.edu.sg.opwrequest
type: application
framework:
  name: SAPUI5
  version: 1.145.0
  libraries:
    - name: sap.m
    - name: sap.ui.core
    - name: sap.ushell
    - name: themelib_sap_horizon
server:
  customMiddleware:
    - name: fiori-tools-appreload
      afterMiddleware: compression
      configuration:
        port: 35729
        path: webapp
        delay: 300
    - name: fiori-tools-preview
      afterMiddleware: fiori-tools-appreload
      configuration:
        flp:
          theme: sap_horizon
    - name: fiori-tools-proxy
      afterMiddleware: compression
      configuration:
        ignoreCertErrors: false # If set to true, certificate errors will be ignored. E.g. self-signed certificates will be accepted
        backend:
        - path: /odata/v2/cwned
          url: https://national-university-of-singapore-nus-cf-btp-uat-r2fbv1y400de6b1.cfapps.ap11.hana.ondemand.com
          destination: nusbtpcwsned  
        - path: /cwned
          url: https://national-university-of-singapore-nus-cf-btp-uat-r2fbv1y400de6b1.cfapps.ap11.hana.ondemand.com
          destination: nusbtpcwsned            
        - path: /v2/catalog
          url: https://national-university-of-singapore-nus-cf-btp-uat-r2fbv1y4a91df23.cfapps.ap11.hana.ondemand.com
          destination: nusbtputil
        - path: /v2/util
          url: https://national-university-of-singapore-nus-cf-btp-uat-r2fbv1y4a91df23.cfapps.ap11.hana.ondemand.com
          destination: nusbtputil