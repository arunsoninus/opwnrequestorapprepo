_schema-version: "3.2"
ID: opwnrequestorapp
version: 0.0.1
modules:
- name: opwnrequestorapp-destination-content
  type: com.sap.application.content
  requires:
  - name: opwnrequestorapp-destination-service
    parameters:
      content-target: true
  - name: opwnrequestorapp_html_repo_host
    parameters:
      service-key:
        name: opwnrequestorapp_html_repo_host-key
  - name: uaa_opwnrequestorapp
    parameters:
      service-key:
        name: uaa_opwnrequestorapp-key
  parameters:
    content:
      instance:
        destinations:
        - Name: opwnrequestorapp_opwnrequestorapp_html_repo_host
          ServiceInstanceName: opwnrequestorapp-html5-app-host-service
          ServiceKeyName: opwnrequestorapp_html_repo_host-key
          sap.cloud.service: opwnrequestorapp
        - Authentication: OAuth2UserTokenExchange
          Name: opwnrequestorapp_uaa_opwnrequestorapp
          ServiceInstanceName: opwnrequestorapp-xsuaa-service
          ServiceKeyName: uaa_opwnrequestorapp-key
          sap.cloud.service: opwnrequestorapp
        existing_destinations_policy: ignore
  build-parameters:
    no-source: true
- name: opwnrequestorapp-app-content
  type: com.sap.application.content
  path: .
  requires:
  - name: opwnrequestorapp_html_repo_host
    parameters:
      content-target: true
  build-parameters:
    build-result: resources
    requires:
    - artifacts:
      - nusedusgopwrequest.zip
      name: nusedusgopwrequest
      target-path: resources/
- name: nusedusgopwrequest
  type: html5
  path: opwrequest
  build-parameters:
    build-result: dist
    builder: custom
    commands:
    - npm install
    - npm run build:cf
    supported-platforms: []
resources:
- name: opwnrequestorapp-destination-service
  type: org.cloudfoundry.managed-service
  parameters:
    config:
      HTML5Runtime_enabled: true
      init_data:
        instance:
          destinations:
          - Authentication: NoAuthentication
            Name: ui5
            ProxyType: Internet
            Type: HTTP
            URL: https://ui5.sap.com
          existing_destinations_policy: update
      version: 1.0.0
    service: destination
    service-name: opwnrequestorapp-destination-service
    service-plan: lite
- name: opwnrequestorapp_html_repo_host
  type: org.cloudfoundry.managed-service
  parameters:
    service: html5-apps-repo
    service-name: opwnrequestorapp-html5-app-host-service
    service-plan: app-host
- name: uaa_opwnrequestorapp
  type: org.cloudfoundry.managed-service
  parameters:
    path: ./xs-security.json
    service: xsuaa
    service-name: opwnrequestorapp-xsuaa-service
    service-plan: application
parameters:
  deploy_mode: html5-repo
  enable-parallel-deployments: true
